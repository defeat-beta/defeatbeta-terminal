name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new commit lands —
# saves Actions minutes during rapid PR pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + setup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install JS dependencies
        # No --frozen-lockfile because .gitignore currently excludes bun.lock.
        # Once the lockfile is committed, switch this to --frozen-lockfile.
        run: bun install

      - name: Install Python dependencies
        run: bun run setup

      - name: TypeScript type check
        run: bunx tsc --noEmit
