name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new commit lands —
# saves Actions minutes during rapid PR pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + setup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # Project uses `uv venv` + `requirements.txt` (not `uv sync`/`uv.lock`),
          # so point the cache key at requirements.txt instead of the default uv.lock.
          cache-dependency-glob: requirements.txt

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: bun run setup

      - name: TypeScript type check
        run: bunx tsc --noEmit
