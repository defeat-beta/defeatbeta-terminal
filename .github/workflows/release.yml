name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            target: bun-darwin-arm64
          - platform: darwin-x64
            target: bun-darwin-x64
          - platform: linux-arm64
            target: bun-linux-arm64
          - platform: linux-x64
            target: bun-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Build binary
        run: OUTFILE=dist/defeatbeta-${{ matrix.platform }} bun run scripts/build.ts ${{ matrix.target }}

      - name: Make binary executable
        run: chmod +x dist/defeatbeta-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: defeatbeta-${{ matrix.platform }}
          path: dist/defeatbeta-${{ matrix.platform }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/defeatbeta-darwin-arm64 \
            dist/defeatbeta-darwin-x64 \
            dist/defeatbeta-linux-arm64 \
            dist/defeatbeta-linux-x64 \
            install.sh
